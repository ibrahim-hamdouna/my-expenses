{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Expenses{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block navbar %}
        <header>
            <nav aria-label="Main navigation">
                <div class="logo">
                    <i class="fa-solid fa-dollar-sign"></i>
                    My Expenses
                </div>
                <ul>
                    <li><a href="{% url 'dashboard' %}"><i class="fa-solid fa-list-ul" aria-hidden="true"></i> Dashboard</a></li>
                    <li><a href="{% url 'expenses' %}"><i class="fa-solid fa-pen" aria-hidden="true"></i> Expenses</a></li>
                    <li><a href='{% url 'categories' %}'><i class="fa-solid fa-tags" aria-hidden="true"></i> Categories</a></li>
                    <li><a href="{% url 'reports' %}"><i class="fa-solid fa-chart-line" aria-hidden="true"></i> Reports</a></li>
                </ul>
            </nav>
        </header>
    {% endblock %}
    <main>
        <div class="page-content">
            {% block content %}
            {% endblock %}
        </div>
        <footer class="site-footer">
            <span>My Expenses</span> &middot; Developed by
            <a href="https://github.com/ibrahim-hamdouna" target="_blank" rel="noopener noreferrer">Ibrahim Hamdouna</a>
        </footer>
    </main>
</body>
</html>
